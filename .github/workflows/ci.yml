name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Backend ----------
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff uvicorn

      - name: Lint with ruff
        run: ruff check backend/ --output-format=github || true

      - name: Import-check server.py
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///./ci.db"
          JWT_SECRET: "ci-secret"
        run: python -c "import server; print('server module OK — routes:', len(server.app.routes))"

      - name: Start API server + smoke-test endpoints
        working-directory: backend
        env:
          DATABASE_URL: "sqlite:///./ci-smoke.db"
          JWT_SECRET: "ci-secret"
        run: |
          uvicorn server:app --host 127.0.0.1 --port 8765 --log-level warning &
          SERVER_PID=$!
          for i in {1..20}; do
            curl -fsS http://127.0.0.1:8765/api/health && break
            sleep 1
          done
          echo ""
          TOK=$(curl -fsS -X POST http://127.0.0.1:8765/api/auth/login \
                     -H 'Content-Type: application/json' \
                     -d '{"email":"admin@mtcedu.co.in","password":"Admin@123"}' \
                | python -c 'import json,sys;print(json.load(sys.stdin)["access_token"])')
          test -n "$TOK" && echo "Login OK"
          curl -fsS http://127.0.0.1:8765/api/dashboard/stats -H "Authorization: Bearer $TOK" > /dev/null
          echo "Dashboard OK"
          kill $SERVER_PID || true

  # ---------- Frontend ----------
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cache yarn deps (only if lockfile committed)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            frontend/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('frontend/yarn.lock', 'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --network-timeout 300000

      - name: Lint
        working-directory: frontend
        run: yarn eslint src --ext .js,.jsx --max-warnings 500 || true

      - name: Build production bundle
        working-directory: frontend
        env:
          CI: "false"
          REACT_APP_BACKEND_URL: ""
        run: yarn build
