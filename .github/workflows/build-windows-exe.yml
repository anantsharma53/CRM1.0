name: Build MicrotechCRM binaries (Windows + Linux + macOS)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            artifact: MicrotechCRM.exe
            asset:    MicrotechCRM-windows.exe
          - os: ubuntu-latest
            name: linux
            artifact: MicrotechCRM
            asset:    MicrotechCRM-linux
          - os: macos-latest
            name: macos
            artifact: MicrotechCRM
            asset:    MicrotechCRM-macos
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Cache yarn deps (only if lockfile committed)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/yarn
            frontend/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('frontend/yarn.lock', 'frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install frontend dependencies
        working-directory: frontend
        # No --frozen-lockfile: works even before yarn.lock is committed
        run: yarn install --network-timeout 300000

      - name: Build React frontend (offline mode -> relative /api)
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ""
          CI: "false"
        run: yarn build

      - name: Install backend + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller uvicorn

      - name: Build binary with PyInstaller
        run: pyinstaller --clean MicrotechCRM.spec

      # ---------- Windows smoke test ----------
      - name: Smoke-test the built .exe (Windows only)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $exe = "dist/MicrotechCRM.exe"
          if (!(Test-Path $exe)) { throw "exe not found" }
          $env:MTC_PORT = "8765"
          $proc = Start-Process -FilePath $exe -PassThru -WindowStyle Hidden
          Start-Sleep -Seconds 12
          try {
            $health = Invoke-RestMethod http://127.0.0.1:8765/api/health
            Write-Host "Health OK: $($health.status)"
            $body = @{ email='admin@mtcedu.co.in'; password='Admin@123' } | ConvertTo-Json
            $login = Invoke-RestMethod -Method Post http://127.0.0.1:8765/api/auth/login `
              -Body $body -ContentType 'application/json'
            if (-not $login.access_token) { throw "login failed" }
            Write-Host "Login OK for $($login.user.email) [$($login.user.role)]"
          } finally { Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue }

      # ---------- Linux/macOS smoke test ----------
      - name: Smoke-test the built binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          bin="dist/MicrotechCRM"
          test -x "$bin" || { echo "binary missing"; exit 1; }
          MTC_PORT=8765 "$bin" > /tmp/smoke.log 2>&1 &
          pid=$!
          sleep 12
          curl -fsS http://127.0.0.1:8765/api/health || { cat /tmp/smoke.log; kill $pid; exit 1; }
          echo ""
          tok=$(curl -fsS -X POST http://127.0.0.1:8765/api/auth/login \
                     -H 'Content-Type: application/json' \
                     -d '{"email":"admin@mtcedu.co.in","password":"Admin@123"}' \
                | python3 -c 'import json,sys;print(json.load(sys.stdin)["access_token"])')
          test -n "$tok" && echo "Login OK"
          kill $pid || true

      # ---------- Optional: Windows code-signing ----------
      - name: Sign MicrotechCRM.exe (only if secrets configured)
        if: matrix.os == 'windows-latest' && env.WIN_CERT_PFX != ''
        env:
          WIN_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WIN_CERT_PWD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          $pfxBytes = [Convert]::FromBase64String($env:WIN_CERT_PFX)
          [IO.File]::WriteAllBytes("cert.pfx", $pfxBytes)
          $signtool = Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin" -Recurse -Filter signtool.exe | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
          & $signtool.FullName sign /f cert.pfx /p $env:WIN_CERT_PWD /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist/MicrotechCRM.exe
          Remove-Item cert.pfx -Force

      # ---------- Rename + upload ----------
      - name: Rename artifact for release
        shell: bash
        run: |
          cd dist
          mv "${{ matrix.artifact }}" "${{ matrix.asset }}"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MicrotechCRM-${{ matrix.name }}-${{ github.sha }}
          path: dist/${{ matrix.asset }}
          retention-days: 30
          if-no-files-found: error

      - name: Attach to GitHub Release (only on tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
